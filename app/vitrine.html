<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kinder — Como apareço para as famílias</title>
  <link rel="icon" type="image/png" href="../Kinder_Coracao.png">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #f0f2ec;
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
    }

    header {
      background: #3a4e2a;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 18px;
      font-weight: 700;
      color: #c8d8a0;
      letter-spacing: 3px;
      text-decoration: none;
    }

    .btn-voltar {
      background: rgba(255,255,255,0.12);
      border: none;
      color: #c8d8a0;
      font-family: 'Nunito', sans-serif;
      font-size: 13px;
      font-weight: 700;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }

    .btn-voltar:hover { background: rgba(255,255,255,0.2); }

    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 28px 16px 60px;
    }

    .topo {
      text-align: center;
      margin-bottom: 28px;
    }

    .topo h1 {
      font-size: 20px;
      font-weight: 700;
      color: #2d2d2d;
      margin-bottom: 6px;
    }

    .topo p {
      font-size: 14px;
      color: #888;
      line-height: 1.5;
    }

    /* CARD */
    .card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 14px;
      border: 2px solid transparent;
      display: flex;
      align-items: center;
      gap: 20px;
      transition: all 0.2s;
    }

    .card.destaque {
      border-color: #3a4e2a;
      box-shadow: 0 6px 24px rgba(58,78,42,0.13);
      position: relative;
    }

    .card.desbotado {
      opacity: 0.5;
    }

    .badge-voce {
      position: absolute;
      top: -12px;
      left: 20px;
      background: #3a4e2a;
      color: #c8d8a0;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 14px;
      border-radius: 99px;
      letter-spacing: 1px;
    }

    /* FOTO */
    .foto-circulo {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: #e8e8e8;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      overflow: hidden;
      border: 3px solid #f0f0f0;
    }

    .card.destaque .foto-circulo {
      border-color: #c8d8a0;
    }

    /* INFO */
    .info { flex: 1; min-width: 0; }

    .card-nome {
      font-size: 17px;
      font-weight: 700;
      color: #2d2d2d;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-cidade {
      font-size: 13px;
      color: #888;
      margin-bottom: 10px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 10px;
    }

    .tag {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 99px;
      font-weight: 600;
    }

    .tag-exp    { background: #e8f0ff; color: #3a5aa0; }
    .tag-estilo { background: #eef3e8; color: #4a5e3a; }
    .tag-modal  { background: #fff3e8; color: #a05a3a; }
    .tag-coz    { background: #ffe8f0; color: #a03a5a; }
    .tag-vazio  { background: #f5f5f5; color: #ccc; font-style: italic; }

    .card-status {
      font-size: 12px;
      font-weight: 700;
      color: #3a4e2a;
    }

    .card-status.incompleto { color: #aaa; }

    /* DIVISOR */
    .divisor {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: #bbb;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .divisor::before,
    .divisor::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e0e0e0;
    }

    /* LOADING */
    .loading {
      text-align: center;
      padding: 60px;
      color: #888;
      font-size: 14px;
    }

    /* MOBILE */
    @media (max-width: 480px) {
      .foto-circulo {
        width: 72px;
        height: 72px;
        font-size: 32px;
      }

      .card-nome { font-size: 15px; }
      .card { gap: 14px; padding: 16px; }
    }
  </style>
</head>
<body>

<header>
  <a href="../index.html" class="logo">🤍 KINDER</a>
  <a href="./dashboard.html" class="btn-voltar">← Voltar</a>
</header>

<div class="container">

  <div class="topo">
    <h1>Como você aparece para as famílias</h1>
    <p>Veja seu perfil ao lado de outros cuidadores.<br>Quanto mais completo, mais chances de conexão.</p>
  </div>

  <div id="lista">
    <div class="loading">Carregando...</div>
  </div>

</div>

<!-- FIREBASE -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAMe9GRhZyYOiDCVQBxMnu8MHjuaY1hY5Y",
    authDomain: "kinder-4dd7b.firebaseapp.com",
    projectId: "kinder-4dd7b",
    storageBucket: "kinder-4dd7b.firebasestorage.app",
    messagingSenderId: "874034411154",
    appId: "1:874034411154:web:8fb0122f8b9750197dd84b",
    measurementId: "G-KKN5D5NEK0"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = './login.html'; return; }

    try {
      const snap = await getDoc(doc(db, 'cuidadores', user.uid));
      const dados = snap.exists() ? snap.data() : { nome: user.displayName || '', perfil: {} };
      renderVitrine(dados);
    } catch(e) {
      renderVitrine({ nome: user.displayName || '', perfil: {} });
    }
  });

  var FICTICIOS = [
    { nome: 'Ana Paula Souza',    cidade: 'São Paulo',  estilo: 'comunicativa', experiencia: ['alzheimer','parkinson'], cozinha: 'sim',    modalidade: ['diurno','integral'], foto: '👩'    },
    { nome: 'Rosana Mendes',      cidade: 'São Paulo',  estilo: 'tranquila',    experiencia: ['acamados','avc'],        cozinha: 'básico', modalidade: ['pernoite','24h'],    foto: '👩‍🦱'  },
    { nome: 'Claudete Ferreira',  cidade: 'Guarulhos',  estilo: 'adapto',       experiencia: ['paliativos'],            cozinha: 'sim',    modalidade: ['integral'],          foto: '👩‍🦳'  },
    { nome: 'Márcia Teixeira',    cidade: 'São Paulo',  estilo: 'comunicativa', experiencia: ['alzheimer','demência'],  cozinha: 'não',    modalidade: ['diurno'],            foto: '🧑‍⚕️' },
    { nome: 'Silvia Rodrigues',   cidade: 'São Paulo',  estilo: 'adapto',       experiencia: ['parkinson','acamados'],  cozinha: 'sim',    modalidade: ['fds','pernoite'],    foto: '👩‍🦰'  },
    { nome: 'Beatriz Carvalho',   cidade: 'Santo André', estilo: 'tranquila',   experiencia: ['avc'],                   cozinha: 'básico', modalidade: ['diurno','fds'],      foto: '👩'    },
    { nome: 'Fernanda Lima',      cidade: 'São Paulo',  estilo: 'comunicativa', experiencia: ['alzheimer'],             cozinha: 'sim',    modalidade: ['integral','24h'],    foto: '👩‍🦱'  },
  ];

  function renderCard(dados, isVoce) {
    var p    = dados.perfil || {};
    var nome = isVoce ? dados.nome : dados.nome;
    var cidade = isVoce ? (p.cidade || '') : (dados.cidade || '');
    var exps   = isVoce
      ? (Array.isArray(p.experiencia) ? p.experiencia : [])
      : (dados.experiencia || []);
    var estilo    = isVoce ? (p.estilo || '') : (dados.estilo || '');
    var cozinha   = isVoce ? (p.cozinha || '') : (dados.cozinha || '');
    var modalidade = isVoce
      ? (Array.isArray(p.modalidade) ? p.modalidade : [])
      : (dados.modalidade || []);
    var foto = isVoce ? '👤' : dados.foto;

    var tags = '';
    if (exps.length) {
      tags += exps.slice(0,2).map(function(e) {
        return '<span class="tag tag-exp">' + e + '</span>';
      }).join('');
    } else if (isVoce) {
      tags += '<span class="tag tag-vazio">sem experiência</span>';
    }
    if (estilo) tags += '<span class="tag tag-estilo">' + estilo + '</span>';
    if (modalidade.length) tags += '<span class="tag tag-modal">' + modalidade[0] + (modalidade[1] ? ' · ' + modalidade[1] : '') + '</span>';
    if (cozinha === 'sim') tags += '<span class="tag tag-coz">🍳 cozinha</span>';

    var pronto = isVoce && cidade && exps.length && estilo;
    var statusHtml = isVoce
      ? '<div class="card-status ' + (pronto ? '' : 'incompleto') + '">' +
          (pronto ? '✓ Pronto para match' : '→ Complete o perfil para se destacar') +
        '</div>'
      : '';

    var classeCard = isVoce ? 'card destaque' : 'card desbotado';
    var badgeHtml  = isVoce ? '<div class="badge-voce">✦ VOCÊ</div>' : '';

    return '<div class="' + classeCard + '">' +
      badgeHtml +
      '<div class="foto-circulo">' + foto + '</div>' +
      '<div class="info">' +
        '<div class="card-nome">' + (nome || '—') + '</div>' +
        '<div class="card-cidade">' + (cidade ? '📍 ' + cidade : '<span style="color:#ddd">📍 adicione sua cidade</span>') + '</div>' +
        '<div class="tags">' + (tags || '<span class="tag tag-vazio">perfil incompleto</span>') + '</div>' +
        statusHtml +
      '</div>' +
    '</div>';
  }

  function renderVitrine(dados) {
    var metade = Math.floor(FICTICIOS.length / 2);
    var antes  = FICTICIOS.slice(0, metade);
    var depois = FICTICIOS.slice(metade);

    var html = antes.map(function(f) { return renderCard(f, false); }).join('') +
      '<div class="divisor">SEU PERFIL</div>' +
      renderCard(dados, true) +
      '<div class="divisor">OUTROS CUIDADORES</div>' +
      depois.map(function(f) { return renderCard(f, false); }).join('');

    document.getElementById('lista').innerHTML = html;
  }
</script>

</body>
</html>
