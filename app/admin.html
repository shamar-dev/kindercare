<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kinder — Painel Admin</title>
  <link rel="icon" type="image/png" href="../Kinder_Coracao.png">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script>emailjs.init('sNQgEYMxGZ6_abMxT');</script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f0f2ec; font-family: 'Nunito', sans-serif; min-height: 100vh; }

    header {
      background: #2d3e20;
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo { font-size: 16px; font-weight: 700; color: #c8d8a0; letter-spacing: 3px; }
    .admin-badge { font-size: 11px; font-weight: 700; background: #c8d8a0; color: #2d3e20; padding: 3px 10px; border-radius: 99px; letter-spacing: 1px; }
    .btn-sair { background: rgba(255,255,255,0.1); border: none; color: #c8d8a0; font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 700; padding: 6px 14px; border-radius: 8px; cursor: pointer; }
    .btn-sair:hover { background: rgba(255,255,255,0.2); }

    .loading { display: flex; align-items: center; justify-content: center; min-height: 60vh; font-size: 14px; color: #888; }

    .container { max-width: 1100px; margin: 0 auto; padding: 28px 20px 60px; display: none; }

    /* RESUMO */
    .resumo { display: flex; flex-direction: column; gap: 12px; margin-bottom: 32px; }

    .resumo-card {
      background: white;
      border-radius: 12px;
      padding: 20px 24px;
    }

    .resumo-topo { display: flex; align-items: center; gap: 14px; justify-content: space-between; }
    .resumo-icone { font-size: 32px; }
    .resumo-num { font-size: 28px; font-weight: 700; color: #2d2d2d; line-height: 1; }
    .resumo-label { font-size: 12px; color: #888; margin-top: 3px; }

    .resumo-status { display: flex; flex-wrap: wrap; gap: 8px; }
    .resumo-status-item { font-size: 12px; color: #555; background: #f5f5f5; border-radius: 8px; padding: 4px 10px; cursor: pointer; transition: background 0.15s; }
    .resumo-status-item:hover { background: #e8edd8; color: #2d3e20; }
    .resumo-status-item span { font-weight: 700; color: #2d2d2d; }

    /* TABS */
    .tabs { display: flex; gap: 4px; margin-bottom: 20px; background: white; padding: 6px; border-radius: 12px; width: fit-content; }
    .tab { padding: 8px 20px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; color: #888; border: none; background: none; font-family: 'Nunito', sans-serif; transition: all 0.15s; }
    .tab.ativo { background: #3a4e2a; color: #c8d8a0; }

    /* FILTROS */
    .filtros { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    .filtros input, .filtros select { padding: 9px 14px; border: 1.5px solid #e0e0e0; border-radius: 8px; font-family: 'Nunito', sans-serif; font-size: 13px; outline: none; background: white; color: #2d2d2d; }
    .filtros input:focus, .filtros select:focus { border-color: #6b7c52; }
    .filtros input { min-width: 200px; flex: 1; }

    /* CARDS */
    .cards-grid { display: flex; flex-direction: column; gap: 12px; }

    .card {
      background: white;
      border-radius: 14px;
      padding: 20px;
      border: 2px solid #f0f0f0;
      transition: border 0.2s;
    }

    .card:hover { border-color: #c8d8a0; }

    .card-topo { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
    .card-foto { width: 52px; height: 52px; border-radius: 50%; background: #e8e8e8; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
    .card-nome { font-size: 15px; font-weight: 700; color: #2d2d2d; margin-bottom: 2px; }
    .card-email { font-size: 12px; color: #aaa; }
    .card-info { font-size: 13px; color: #555; margin-bottom: 10px; line-height: 1.6; }

    .tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 14px; }
    .tag { font-size: 11px; padding: 3px 9px; border-radius: 99px; font-weight: 600; }
    .tag-cidade { background: #eef3e8; color: #4a5e3a; }
    .tag-exp { background: #e8f0ff; color: #3a5aa0; }
    .tag-modal { background: #fff3e8; color: #a05a3a; }
    .tag-cond { background: #f5e8ff; color: #6a3aa0; }

    /* STATUS SELECT */
    .status-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding-top: 12px; border-top: 1px solid #f0f0f0; }
    .status-label-txt { font-size: 12px; color: #888; font-weight: 600; }

    .status-select {
      font-family: 'Nunito', sans-serif;
      font-size: 12px;
      font-weight: 700;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      padding: 6px 10px;
      cursor: pointer;
      outline: none;
      color: #2d2d2d;
      background: white;
    }

    .status-select.pendente   { border-color: #f0d080; color: #7a5a10; background: #fff8e8; }
    .status-select.analise    { border-color: #a0b8f0; color: #1a3a80; background: #e8f0ff; }
    .status-select.aprovado   { border-color: #90c880; color: #2a5a1a; background: #eef8e8; }
    .status-select.suspenso   { border-color: #f0a0a0; color: #800000; background: #fee8e8; }
    .status-select.andamento  { border-color: #a0b8f0; color: #1a3a80; background: #e8f0ff; }
    .status-select.match      { border-color: #90c880; color: #2a5a1a; background: #eef8e8; }

    .btn-whats { background: #25d366; color: white; border: none; padding: 6px 12px; border-radius: 8px; font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; }

    .vazio { text-align: center; padding: 48px; color: #bbb; font-size: 14px; background: white; border-radius: 14px; }

    /* DATA */
    .card-data { font-size: 11px; color: #ccc; margin-top: 6px; }
  @keyframes pulse-borda {
    0%, 100% { box-shadow: 0 0 0 0 rgba(58,78,42,0.5); border-color: #c8d8a0; }
    50%       { box-shadow: 0 0 0 5px rgba(58,78,42,0);  border-color: #3a4e2a; }
  }
  .btn-msgs-novo {
    animation: pulse-borda 1.4s ease-in-out infinite;
    border-color: #3a4e2a !important;
  }
  @keyframes pulse-numero {
    0%, 100% { color: #2d2d2d; transform: scale(1); }
    50%       { color: #c0392b; transform: scale(1.15); }
  }
  .resumo-num.tem-novo {
    animation: pulse-numero 1s ease-in-out infinite;
  }
  </style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:12px;">
    <span class="logo">🤍 KINDER</span>
    <span class="admin-badge">ADMIN</span>
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <span style="font-size:12px;color:#8a9e6a;" id="header-email"></span>
    <a href="match.html" class="btn-sair">🤝 Match</a>
    <button class="btn-sair" onclick="abrirModalConfig()">⚙️ Config</button>
    <button class="btn-sair" onclick="sair()">Sair</button>
  </div>
</header>

<!-- TELA DE LOGIN ADMIN -->
<div id="tela-login" style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;">

    <div id="msg-login" style="font-size:13px;padding:10px 14px;border-radius:8px;margin-bottom:16px;display:none;background:#fdecea;color:#c0392b;"></div>
    <div style="margin-bottom:14px;">

      <input type="email" id="input-email" placeholder="seu@email.com"

        onkeydown="if(event.key==='Enter')entrarAdmin()">
    </div>
    <div style="margin-bottom:20px;">
      <label style="display:block;font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;">Senha</label>

    <button onclick="entrarAdmin()" id="btn-entrar"

</div>

<div class="loading" id="loading" style="display:none;">Carregando painel...</div>

<div class="container" id="container">

  <!-- RESUMO -->

    <div class="resumo-card" onclick="abrirAba('cuidadores')" style="cursor:pointer;">

            <div class="resumo-num" id="num-cuidadores">—</div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab ativo" onclick="mudarTab('cuidadores')">🧑‍⚕️ Cuidadores</button>
    <button class="tab" onclick="mudarTab('familias')">🏠 Famílias</button>
    <button class="tab" onclick="mudarTab('interesses')">💚 Interesses <span id="badge-interesses" style="display:none;background:#e57373;color:white;font-size:10px;padding:1px 6px;border-radius:99px;margin-left:4px;"></span></button>
  </div>

  <!-- PAINEL INTERESSES -->

  <!-- FILTROS -->
  <div class="filtros" id="painel-filtros">
    <input type="text" id="filtro-busca" placeholder="Buscar por nome ou email..." oninput="renderAtual()">
    <select id="filtro-ordem" onchange="renderAtual()" style="width:auto;">

      <option value="falta_perfil">⚠️ Falta perfil</option>
      <option value="falta_docs">⚠️ Falta documentos</option>
      <option value="pendente">Pendente</option>
      <option value="analise">Em análise</option>
      <option value="aprovado">Aprovado</option>
      <option value="suspenso">Suspenso</option>
      <option value="andamento">Em andamento</option>
      <option value="match">Match encontrado</option>
      <option value="excluido">🗑 Excluídos</option>
    </select>
  </div>

  <!-- LISTA -->
  <div class="cards-grid" id="cards-grid"></div>

</div>

<!-- MODAL DETALHE CUIDADORA -->
<div id="modal-detalhe-cuidadora" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;padding:16px;">

    <div style="background:#2d3e20;padding:18px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
      <div style="font-size:15px;font-weight:700;color:#c8d8a0;" id="detalhe-c-titulo">Cuidadora</div>
      <button onclick="document.getElementById('modal-detalhe-cuidadora').style.display='none'" style="background:none;border:none;color:#8a9e6a;font-size:22px;cursor:pointer;line-height:1;">×</button>

</div>

<!-- MODAL DETALHE FAMÍLIA -->
<div id="modal-detalhe-familia" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;padding:16px;">
  <div style="background:white;border-radius:16px;width:100%;max-width:560px;max-height:88vh;display:flex;flex-direction:column;overflow:hidden;">
    <div style="background:#2d3e20;padding:18px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">

</div>

<!-- MODAL MENSAGENS ADMIN -->
<div id="modal-msgs-admin" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;padding:24px 16px;">
  <div style="background:white;border-radius:16px;padding:24px 20px 28px;max-width:520px;width:100%;max-height:85vh;display:flex;flex-direction:column;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <div>
        <div style="font-size:15px;font-weight:700;color:#2d2d2d;" id="admin-msgs-titulo">Conversas</div>
        <div style="font-size:11px;color:#aaa;" id="admin-msgs-sub"></div>

    <div id="admin-msgs-corpo" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:12px;">
      <div style="text-align:center;color:#bbb;font-size:13px;padding:24px;">Carregando...</div>
    </div>
  </div>
</div>

<!-- MODAL CONFIGURAÇÕES -->
<div id="modal-config" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;align-items:center;justify-content:center;padding:16px;">
  <div style="background:white;border-radius:16px;width:100%;max-width:440px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.15);">

    <!-- Header modal -->
    <div style="background:#2d3e20;padding:20px 24px;display:flex;align-items:center;justify-content:space-between;">
      <div style="font-size:16px;font-weight:700;color:#c8d8a0;">⚙️ Configurações</div>
      <button onclick="fecharModalConfig()" style="background:none;border:none;color:#8a9e6a;font-size:20px;cursor:pointer;line-height:1;">×</button>
    </div>

    <!-- Tabs do modal -->
    <div style="display:flex;border-bottom:2px solid #f0f0f0;">
      <button id="cfg-tab-conta" onclick="mudarCfgTab('conta')"
        style="flex:1;padding:12px;font-family:Nunito,sans-serif;font-size:13px;font-weight:700;border:none;cursor:pointer;background:white;color:#2d2d2d;border-bottom:2px solid #2d3e20;margin-bottom:-2px;">
        👤 Minha conta
      </button>
      <button id="cfg-tab-admins" onclick="mudarCfgTab('admins')"
        style="flex:1;padding:12px;font-family:Nunito,sans-serif;font-size:13px;font-weight:700;border:none;cursor:pointer;background:white;color:#aaa;border-bottom:2px solid transparent;margin-bottom:-2px;">
        🛡️ Administradores
      </button>
    </div>

    <!-- Aba: Minha conta -->
    <div id="cfg-painel-conta" style="padding:24px;">
      <div id="msg-conta" style="font-size:13px;padding:10px 14px;border-radius:8px;margin-bottom:16px;display:none;"></div>

      <div style="margin-bottom:12px;">
        <div style="font-size:12px;color:#aaa;margin-bottom:4px;">Logado como</div>
        <div style="font-size:14px;font-weight:700;color:#2d2d2d;" id="cfg-email-exibido"></div>
      </div>

      <div style="border-top:1px solid #f0f0f0;padding-top:20px;">
        <div style="font-size:12px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;">Alterar senha</div>
        <div style="margin-bottom:12px;">
          <input type="password" id="cfg-nova-senha" placeholder="Nova senha (mín. 8 caracteres)"
            style="width:100%;padding:11px 14px;border:1.5px solid #e0e0e0;border-radius:8px;font-family:Nunito,sans-serif;font-size:14px;outline:none;">
        </div>
        <div style="margin-bottom:16px;">
          <input type="password" id="cfg-confirma-senha" placeholder="Confirmar nova senha"
            style="width:100%;padding:11px 14px;border:1.5px solid #e0e0e0;border-radius:8px;font-family:Nunito,sans-serif;font-size:14px;outline:none;">
        </div>
        <button onclick="salvarNovaSenha()" id="btn-salvar-senha"
          style="width:100%;padding:11px;background:#2d3e20;color:#c8d8a0;border:none;border-radius:8px;font-family:Nunito,sans-serif;font-size:14px;font-weight:700;cursor:pointer;">
          Salvar nova senha
        </button>
      </div>
    </div>

    <!-- Aba: Administradores -->
    <div id="cfg-painel-admins" style="padding:24px;display:none;">
      <div id="msg-admins" style="font-size:13px;padding:10px 14px;border-radius:8px;margin-bottom:16px;display:none;"></div>

      <div style="font-size:12px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;">Admins cadastrados</div>
      <div id="lista-admins" style="margin-bottom:20px;min-height:40px;"></div>

    </div>

  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, updatePassword, updateEmail, createUserWithEmailAndPassword }
    from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
  import { getFirestore, collection, getDocs, doc, updateDoc, getDoc, setDoc, deleteDoc, query, where, orderBy }
    from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
  import { getStorage, ref as storageRef, deleteObject, listAll }
    from "https://www.gstatic.com/firebasejs/11.0.0/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAMe9GRhZyYOiDCVQBxMnu8MHjuaY1hY5Y",
    authDomain: "kinder-4dd7b.firebaseapp.com",
    projectId: "kinder-4dd7b",
    storageBucket: "kinder-4dd7b.firebasestorage.app",
    messagingSenderId: "874034411154",
    appId: "1:874034411154:web:8fb0122f8b9750197dd84b",
    measurementId: "G-KKN5D5NEK0"
  };

  const app     = initializeApp(firebaseConfig);
  const auth    = getAuth(app);
  const db      = getFirestore(app);
  const storage = getStorage(app);

  var cuidadores = [];
  var familias   = [];
  var tabAtual   = 'cuidadores';

  // ── AUTH ────────────────────────────────────────────
  onAuthStateChanged(auth, async (user) => {
    if (!user) return; // aguarda login manual

    const adminSnap = await getDoc(doc(db, 'admins', user.uid));
    if (!adminSnap.exists()) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('tela-login').style.display = 'flex';
      mostrarErroLogin('Acesso negado para este usuário.');
      await signOut(auth);
      return;
    }

    document.getElementById('tela-login').style.display  = 'none';
    document.getElementById('loading').style.display     = 'flex';
    document.getElementById('header-email').textContent  = user.email;
    await carregarDados();
    carregarBadgeInteresses();
  });

  window.entrarAdmin = async function() {
    const email = document.getElementById('input-email').value.trim();
    const senha = document.getElementById('input-senha').value;
    const btn   = document.getElementById('btn-entrar');

    if (!email || !senha) { mostrarErroLogin('Preencha e-mail e senha.'); return; }

    btn.disabled = true;
    btn.textContent = 'Entrando...';

    try {
      await signInWithEmailAndPassword(auth, email, senha);
    } catch(e) {
      btn.disabled = false;
      btn.textContent = 'Entrar →';
      mostrarErroLogin('E-mail ou senha incorretos.');
    }
  };

  // ── CARREGAR DADOS ─────────────────────────────────
  var uidsComMsgs = { cuidadores: new Set(), familias: new Set() };
  var paresNaoLidos = new Set(); // "familiaId_cuidadorId"

  async function carregarDados() {
    const [snapC, snapF] = await Promise.all([
      getDocs(collection(db, 'cuidadores')),
      getDocs(collection(db, 'familias'))
    ]);
    var snapM = await getDocs(collection(db, 'mensagens')).catch(function(e) {
      console.warn('Admin: sem permissão para ler mensagens —', e.message);
      return { docs: [] };
    });

    cuidadores = snapC.docs.map(d => ({ uid: d.id, ...d.data() }));
    familias   = snapF.docs.map(d => ({ uid: d.id, ...d.data() }));

    uidsComMsgs.cuidadores = new Set();
    uidsComMsgs.familias   = new Set();
    paresNaoLidos = new Set();
    snapM.docs.forEach(function(d) {
      var m = d.data();
      if (m.cuidadorId) uidsComMsgs.cuidadores.add(m.cuidadorId);
      if (m.familiaId)  uidsComMsgs.familias.add(m.familiaId);
      if (!m.lida && !m.lidaPorAdmin) paresNaoLidos.add(m.familiaId + '_' + m.cuidadorId);
    });

    // Resumo
    document.getElementById('num-cuidadores').textContent = cuidadores.length;
    document.getElementById('num-familias').textContent   = familias.length;

    atualizarResumo();
    marcarNovos();

    document.getElementById('loading').style.display  = 'none';
    document.getElementById('container').style.display = 'block';

    renderAtual();
  }

  // ── RENDER ─────────────────────────────────────────
  window.renderAtual = function() {
    if (tabAtual === 'cuidadores') renderCuidadores();
    else renderFamilias();
  };

  window.mudarTab = function(tab) {
    tabAtual = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('ativo'));
    event.target.classList.add('ativo');
    var isInteresses = tab === 'interesses';
    document.getElementById('painel-interesses').style.display = isInteresses ? 'block' : 'none';
    document.getElementById('painel-filtros').style.display    = isInteresses ? 'none' : 'flex';
    document.getElementById('cards-grid').style.display        = isInteresses ? 'none' : 'flex';
    if (isInteresses) {
      renderInteresses();
    } else {
      document.getElementById('filtro-status').value = '';
      document.getElementById('filtro-busca').value  = '';
      renderAtual();
    }
  };

  function perfilIncompleto(item, tipo) {
    var p = item.perfil || {};
    if ((tipo || tabAtual) === 'cuidadores') {
      return !p.cidade || !(p.experiencia && p.experiencia.length);
    }
    return !p.cidade || !p.whatsapp || !p.rotina || !(p.condicao && p.condicao.length);
  }

  function documentosIncompletos(item, tipo) {
    if ((tipo || tabAtual) !== 'cuidadores') return false; // familias não têm documentos
    var p = item.perfil || {};
    return !p.docFrenteUrl || !p.docVersoUrl || !p.antecedentesUrl;
  }

  function cadastroIncompleto(item, tipo) {
    return perfilIncompleto(item, tipo) || documentosIncompletos(item, tipo);
  }

  function parseDataGenerica(v) {
    if (!v) return 0;
    if (v.seconds) return v.seconds * 1000;
    var d = new Date(v);
    if (!isNaN(d)) return d.getTime();
    // formato pt-BR: "dd/mm/yyyy, hh:mm:ss"
    var m = v.match(/(\d{2})\/(\d{2})\/(\d{4})[,\s]+(\d{2}):(\d{2})/);
    if (m) return new Date(m[3], m[2]-1, m[1], m[4], m[5]).getTime();
    return 0;
  }

  function marcarNovos() {
    try {
      var ultC = parseInt(localStorage.getItem('kinderAdminVisto_cuidadores') || '0', 10);
      var ultF = parseInt(localStorage.getItem('kinderAdminVisto_familias') || '0', 10);
      var temNovoC = cuidadores.some(function(c) { return c.status !== 'excluido' && parseDataGenerica(c.criadoEm) > ultC; });
      var temNovoF = familias.some(function(f) { return f.status !== 'excluido' && parseDataGenerica(f.criadoEm) > ultF; });
      document.getElementById('num-cuidadores').classList.toggle('tem-novo', temNovoC);
      document.getElementById('num-familias').classList.toggle('tem-novo', temNovoF);
    } catch(e) {
      console.warn('Admin: falha ao marcar novos cadastros —', e.message);
    }
  }

  function marcarVisitado(tipo) {
    try {
      localStorage.setItem('kinderAdminVisto_' + tipo, Date.now());
      document.getElementById('num-' + tipo).classList.remove('tem-novo');
    } catch(e) {
      console.warn('Admin: falha ao marcar visitado —', e.message);
    }

  function filtrar(lista) {
    var busca  = document.getElementById('filtro-busca').value.toLowerCase();
    var status = document.getElementById('filtro-status').value;
    var ordem  = document.getElementById('filtro-ordem').value;
    var resultado = lista.filter(function(item) {
      var nome  = (item.nome || '').toLowerCase();
      var email = (item.email || '').toLowerCase();
      if (busca && nome.indexOf(busca) === -1 && email.indexOf(busca) === -1) return false;
      if (status) {
        if (status === 'incompleto') {
          if (item.status === 'excluido') return false;
          if (!cadastroIncompleto(item)) return false;
        } else if (status === 'falta_perfil') {
          if (item.status === 'excluido') return false;
          if (!perfilIncompleto(item)) return false;
        } else if (status === 'falta_docs') {
          if (item.status === 'excluido') return false;
          if (!documentosIncompletos(item)) return false;
        } else if (item.status !== status) return false;
      } else {
        if (item.status === 'excluido') return false;
      }
      return true;
    });
    if (ordem === 'az') resultado.sort(function(a, b) { return (a.nome||'').localeCompare(b.nome||'', 'pt'); });
    else if (ordem === 'za') resultado.sort(function(a, b) { return (b.nome||'').localeCompare(a.nome||'', 'pt'); });
    else resultado.sort(function(a, b) {
      return parseDataGenerica(b.criadoEm) - parseDataGenerica(a.criadoEm);
    });
    return resultado;
  }

  // ── RESUMO ─────────────────────────────────────────
  function atualizarResumo() {
    document.getElementById('num-cuidadores').textContent = cuidadores.length;
    document.getElementById('num-familias').textContent   = familias.length;

    var statusC = [
      { key: 'incompleto', label: '⚠️ Cadastro incompleto' },
      { key: 'falta_perfil', label: '⚠️ Falta perfil' },
      { key: 'falta_docs', label: '⚠️ Falta documentos' },
      { key: 'pendente', label: '⏳ Pendente' },
      { key: 'analise',  label: '🔍 Em análise' },
      { key: 'aprovado', label: '✅ Aprovado' },
      { key: 'suspenso', label: '🚫 Suspenso' }
    ];
    var statusF = [
      { key: 'incompleto', label: '⚠️ Cadastro incompleto' },
      { key: 'falta_perfil', label: '⚠️ Falta perfil' },
      { key: 'pendente',  label: '⏳ Pendente' },
      { key: 'analise',   label: '🔍 Em análise' },
      { key: 'andamento', label: '✅ Aprovado para explorar' },
      { key: 'match',     label: '💚 Match encontrado' },
      { key: 'suspenso',  label: '🚫 Suspenso' }
    ];

    function contarEspecial(lista, tipo, key) {
      var fn = key === 'incompleto' ? cadastroIncompleto : (key === 'falta_perfil' ? perfilIncompleto : documentosIncompletos);
      return lista.filter(function(item) { return item.status !== 'excluido' && fn(item, tipo); }).length;
    }

    document.getElementById('status-cuidadores').innerHTML = statusC.map(function(s) {
      var n = (s.key === 'incompleto' || s.key === 'falta_perfil' || s.key === 'falta_docs')
        ? contarEspecial(cuidadores, 'cuidadores', s.key)
        : cuidadores.filter(function(c) { return (c.status || 'pendente') === s.key; }).length;
      return '<div class="resumo-status-item" onclick="event.stopPropagation();filtrarPorStatus(\'cuidadores\',\'' + s.key + '\')">' + s.label + ' <span>' + n + '</span></div>';
    }).join('');

    document.getElementById('status-familias').innerHTML = statusF.map(function(s) {
      var n = (s.key === 'incompleto' || s.key === 'falta_perfil' || s.key === 'falta_docs')
        ? contarEspecial(familias, 'familias', s.key)
        : familias.filter(function(f) { return (f.status || 'pendente') === s.key; }).length;
      return '<div class="resumo-status-item" onclick="event.stopPropagation();filtrarPorStatus(\'familias\',\'' + s.key + '\')">' + s.label + ' <span>' + n + '</span></div>';
    }).join('');
  }

    try {
      await updateDoc(doc(db, 'interesses', id), { status: 'recusado' });
      carregarBadgeInteresses();
      renderInteresses();
    } catch(e) { alert('Erro: ' + e.message); }
  };

  var _adminMsgsConversas = {};

  window.verMensagensAdmin = async function(uid, nome, tipo) {
    var modal = document.getElementById('modal-msgs-admin');
    var corpo = document.getElementById('admin-msgs-corpo');
    document.getElementById('admin-msgs-titulo').textContent = '💬 ' + nome;
    document.getElementById('admin-msgs-sub').textContent = '';
    corpo.innerHTML = '<div style="text-align:center;color:#bbb;font-size:13px;padding:24px;">Carregando...</div>';
    modal.style.display = 'flex';

    try {
      var campo = tipo === 'cuidador' ? 'cuidadorId' : 'familiaId';
      var q = query(collection(db, 'mensagens'), where(campo, '==', uid), orderBy('criadaEm', 'asc'));
      var snap = await getDocs(q);

      var conversas = {};
      snap.forEach(function(d) {
        var m = d.data();
        var chave = m.familiaId + '_' + m.cuidadorId;
        if (!conversas[chave]) conversas[chave] = { familiaNome: m.familiaNome, cuidadorId: m.cuidadorId, msgs: [] };
        conversas[chave].msgs.push(m);
      });
      _adminMsgsConversas = conversas;

      renderAdminInbox();
    } catch(e) {
      corpo.innerHTML = '<div style="color:#c0392b;font-size:13px;padding:16px;">Erro: ' + e.message + '</div>';
    }
  };

  function renderAdminInbox() {
    var corpo = document.getElementById('admin-msgs-corpo');
    document.getElementById('admin-msgs-sub').textContent = Object.keys(_adminMsgsConversas).length + ' conversa(s)';
    corpo.innerHTML = Object.entries(_adminMsgsConversas).map(function(entry) {
      var chave = entry[0], c = entry[1];
      var ultima = c.msgs[c.msgs.length - 1];
      var preview = ultima ? (ultima.de === 'familia' ? (c.familiaNome||'Família') + ': ' + ultima.texto : 'Cuidadora: ' + ultima.texto) : '';
      if (preview.length > 55) preview = preview.substring(0, 55) + '…';
      return '<div onclick="abrirAdminConversa(\'' + chave + '\')" style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:#fafafa;border-radius:12px;cursor:pointer;border:1.5px solid #f0f0f0;">' +
        '<div style="flex:1;min-width:0;">' +
          '<div style="font-size:13px;font-weight:700;color:#2d2d2d;margin-bottom:3px;">👨‍👩‍👦 ' + (c.familiaNome || '—') + '</div>' +
          '<div style="font-size:12px;color:#aaa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + preview + '</div>' +
        '</div>' +
        '<span style="font-size:16px;color:#ccc;margin-left:12px;">›</span>' +
      '</div>';
    }).join('');
  }

  window.abrirAdminConversa = function(chave) {
    var c = _adminMsgsConversas[chave];
    if (!c) return;
    var corpo = document.getElementById('admin-msgs-corpo');
    document.getElementById('admin-msgs-sub').textContent = c.familiaNome;
    var msgsHtml = c.msgs.map(function(m) {
      var deFamilia = m.de === 'familia';
      return '<div style="display:flex;justify-content:' + (deFamilia ? 'flex-start' : 'flex-end') + ';margin-bottom:6px;">' +
        '<div style="max-width:80%;padding:8px 12px;border-radius:10px;font-size:13px;line-height:1.5;' +
          (deFamilia ? 'background:#f0f2ec;color:#2d2d2d;' : 'background:#3a4e2a;color:#c8d8a0;') + '">' +
          '<div style="font-size:10px;font-weight:700;margin-bottom:3px;opacity:0.7;">' + (deFamilia ? (c.familiaNome||'Família') : 'Cuidadora') + '</div>' +
          m.texto +
        '</div>' +
      '</div>';
    }).join('');
    corpo.innerHTML =
      '<button onclick="renderAdminInbox()" style="background:none;border:none;font-size:13px;font-weight:700;color:#3a4e2a;cursor:pointer;margin-bottom:12px;padding:0;">← Voltar</button>' +
      '<div style="display:flex;flex-direction:column;gap:6px;">' + msgsHtml + '</div>';
  };

  window.renderAdminInbox = renderAdminInbox;

  window.excluirRegistro = async function(colecao, uid, nome) {
    if (!confirm('Excluir "' + nome + '"? O registro ficará oculto mas preservado para fins legais.')) return;
    try {
      await updateDoc(doc(db, colecao, uid), { status: 'excluido' });
      var lista = colecao === 'cuidadores' ? cuidadores : familias;
      var item = lista.find(function(i) { return i.uid === uid; });
      if (item) item.status = 'excluido';
      atualizarResumo();
      renderAtual();
    } catch(e) { alert('Erro: ' + e.message); }
  };

  window.restaurarRegistro = async function(colecao, uid) {
    try {
      await updateDoc(doc(db, colecao, uid), { status: 'pendente' });
      var lista = colecao === 'cuidadores' ? cuidadores : familias;
      var item = lista.find(function(i) { return i.uid === uid; });
      if (item) item.status = 'pendente';
      atualizarResumo();
      renderAtual();
    } catch(e) { alert('Erro ao restaurar: ' + e.message); }
  };

  window.deletarMsgAdmin = async function(msgId) {
    if (!confirm('Remover esta mensagem?')) return;
    try {
      await updateDoc(doc(db, 'mensagens', msgId), { deletadaPorAdmin: true });
      var el = document.getElementById('msg-admin-' + msgId);
      if (el) el.innerHTML = '<em style="color:#aaa;font-size:12px;">⚠️ Mensagem removida pelo administrador.</em>';
    } catch(e) { alert('Erro: ' + e.message); }
  };

  window.verMensagensInteresse = async function(familiaId, cuidadorId, familiaNome, cuidadorNome) {
    var chave = familiaId + '_' + cuidadorId;
    paresNaoLidos.delete(chave);
    var btnEl = document.getElementById('btn-conv-' + chave);
    if (btnEl) btnEl.classList.remove('btn-msgs-novo');

    var modal = document.getElementById('modal-msgs-admin');
    var corpo = document.getElementById('admin-msgs-corpo');
    document.getElementById('admin-msgs-titulo').textContent = '💬 ' + familiaNome + ' → ' + cuidadorNome;
    document.getElementById('admin-msgs-sub').textContent = '';
    corpo.innerHTML = '<div style="text-align:center;color:#bbb;font-size:13px;padding:24px;">Carregando...</div>';
    modal.style.display = 'flex';
    try {
      var q = query(collection(db, 'mensagens'),
        where('familiaId', '==', familiaId),
        where('cuidadorId', '==', cuidadorId),
        orderBy('criadaEm', 'asc'));
      var snap = await getDocs(q);
      if (snap.empty) { corpo.innerHTML = '<div style="text-align:center;color:#bbb;font-size:13px;padding:24px;">Nenhuma mensagem.</div>'; return; }
      snap.docs.forEach(function(d) {
        if (!d.data().lidaPorAdmin) updateDoc(doc(db, 'mensagens', d.id), { lidaPorAdmin: true }).catch(() => {});
      });
      document.getElementById('admin-msgs-sub').textContent = snap.size + ' mensagem' + (snap.size !== 1 ? 's' : '');
      corpo.innerHTML = '<div style="display:flex;flex-direction:column;gap:6px;">' +
        snap.docs.map(function(d) {
          var m = d.data(), mid = d.id;
          var deFamilia = m.de === 'familia';
          var texto = m.deletadaPorAdmin
            ? '<em style="color:#aaa;font-size:12px;">⚠️ Mensagem removida pelo administrador.</em>'
            : m.texto;
          var btnDel = m.deletadaPorAdmin ? '' :
            '<button onclick="deletarMsgAdmin(\'' + mid + '\')" title="Remover mensagem" style="background:none;border:none;cursor:pointer;font-size:11px;color:#ddd;padding:2px 4px;line-height:1;flex-shrink:0;" onmouseover="this.style.color=\'#e57373\'" onmouseout="this.style.color=\'#ddd\'">✕</button>';
          return '<div style="display:flex;align-items:flex-start;justify-content:' + (deFamilia ? 'flex-start' : 'flex-end') + ';gap:4px;">' +
            (deFamilia ? '' : btnDel) +
            '<div id="msg-admin-' + mid + '" style="max-width:80%;padding:8px 12px;border-radius:10px;font-size:13px;line-height:1.5;' +
              (deFamilia ? 'background:#f0f2ec;color:#2d2d2d;' : 'background:#3a4e2a;color:#c8d8a0;') + '">' +
              '<div style="font-size:10px;font-weight:700;margin-bottom:3px;opacity:0.7;">' + (deFamilia ? familiaNome : cuidadorNome) + '</div>' +
              texto +
            '</div>' +
            (deFamilia ? btnDel : '') +
          '</div>';
        }).join('') + '</div>';
    } catch(e) {
      corpo.innerHTML = '<div style="color:#c0392b;font-size:13px;padding:16px;">Erro: ' + e.message + '</div>';
    }
  };

  // ── OBSERVAÇÃO INTERNA ─────────────────────────────
  window.salvarObs = async function(colecao, uid, valor) {
    try {
      await updateDoc(doc(db, colecao, uid), { observacaoAdmin: valor });
      var lista = colecao === 'cuidadores' ? cuidadores : familias;
      var item = lista.find(function(i) { return i.uid === uid; });
      if (item) item.observacaoAdmin = valor;
    } catch(e) { console.warn('Erro ao salvar obs:', e.message); }
  };

  // ── MODAIS DETALHE ─────────────────────────────────
  function linha(label, valor) {
    if (!valor) return '';
    return '<div style="margin-bottom:8px;"><div style="font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;">' + label + '</div><div style="font-size:14px;color:#2d2d2d;">' + valor + '</div></div>';
  }
  function arr(v) { return Array.isArray(v) ? v.join(', ') : (v || ''); }

  window.abrirDetalhesCuidadora = function(event, uid) {
    if (event.target.closest('select,button,a')) return;
    var c = cuidadores.find(function(x) { return x.uid === uid; });
    if (!c) return;
    var p = c.perfil || {};
    document.getElementById('detalhe-c-titulo').textContent = c.nome || '—';
    var fotoHtml = p.fotoUrl
      ? '<img src="' + p.fotoUrl + '" style="width:80px;height:80px;border-radius:50%;object-fit:cover;display:block;">'
      : '<div style="width:80px;height:80px;border-radius:50%;background:#e8edd8;display:flex;align-items:center;justify-content:center;font-size:32px;">🧑‍⚕️</div>';
    document.getElementById('detalhe-c-corpo').innerHTML =
      '<div style="display:flex;align-items:center;gap:16px;">' + fotoHtml +
        '<div>' +
          '<div style="font-size:17px;font-weight:700;color:#2d2d2d;">' + (c.nome || '—') + '</div>' +
          '<div style="font-size:13px;color:#aaa;">' + (c.email || '') + '</div>' +
          (p.whatsapp ? '<div style="font-size:13px;color:#3a4e2a;margin-top:4px;">📱 ' + p.whatsapp + '</div>' : '') +
        '</div>' +
      '</div>' +
      '<hr style="border:none;border-top:1px solid #f0f0f0;">' +
      linha('Cidade', p.cidade) +
      linha('Gênero', p.genero) +
      linha('Experiência', arr(p.experiencia)) +
      linha('Modalidade', arr(p.modalidade)) +
      linha('Tipos de cuidado', arr(p.cuidados)) +
      linha('Rotina', p.rotina) +
      linha('Estilo de trabalho', arr(p.estilo)) +
      linha('Restrições', p.restricao) +
      linha('Limite de peso', p.limite) +
      linha('Sobre', p.sobre);
    document.getElementById('modal-detalhe-cuidadora').style.display = 'flex';
  };

  window.abrirDetalhesFamilia = function(event, uid) {
    if (event.target.closest('select,button,a')) return;
    var f = familias.find(function(x) { return x.uid === uid; });
    if (!f) return;
    var p = f.perfil || {};
    document.getElementById('detalhe-f-titulo').textContent = f.nome || '—';
    document.getElementById('detalhe-f-corpo').innerHTML =
      '<div>' +
        '<div style="font-size:17px;font-weight:700;color:#2d2d2d;">' + (f.nome || '—') + '</div>' +
        '<div style="font-size:13px;color:#aaa;">' + (f.email || '') + '</div>' +
        (p.whatsapp ? '<div style="font-size:13px;color:#3a4e2a;margin-top:4px;">📱 ' + p.whatsapp + '</div>' : '') +
      '</div>' +
      '<hr style="border:none;border-top:1px solid #f0f0f0;">' +
      linha('Cidade', p.cidade) +
      '<div style="font-size:11px;font-weight:700;color:#6b7c52;text-transform:uppercase;letter-spacing:1px;margin:4px 0 8px;">Sobre o familiar</div>' +
      linha('Idade', p.idade) +
      linha('Gênero', p.genero_idoso) +
      linha('Condição', arr(p.condicao)) +
      linha('Dependência', p.dependencia) +
      '<div style="font-size:11px;font-weight:700;color:#6b7c52;text-transform:uppercase;letter-spacing:1px;margin:4px 0 8px;">Preferências</div>' +
      linha('Rotina', p.rotina) +
      linha('Personalidade do familiar', p.conversa) +
      linha('Ambiente', arr(p.ambiente)) +
      linha('Gênero preferido do cuidador', p.genero_pref);
    document.getElementById('modal-detalhe-familia').style.display = 'flex';
  };

  window.abrirAba = function(tab) {
    filtrarPorStatus(tab, '');
  };

  window.filtrarPorStatus = function(tab, status) {
    tabAtual = tab;
    document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('ativo'); });
    document.querySelector('.tab[onclick*="' + tab + '"]').classList.add('ativo');
    document.getElementById('filtro-status').value = status;
    document.getElementById('filtro-busca').value  = '';
    renderAtual();
    document.getElementById('container').scrollIntoView({ behavior: 'smooth' });
  };

  // ── RESTAURAR ──────────────────────────────────────

  // ── MUDAR STATUS ───────────────────────────────────
  window.mudarStatus = async function(colecao, uid, selectEl) {
    var novoStatus = selectEl.value;
    selectEl.className = 'status-select ' + novoStatus;
    try {
      await updateDoc(doc(db, colecao, uid), { status: novoStatus });
      // Atualiza local
      var lista = colecao === 'cuidadores' ? cuidadores : familias;
      var item  = lista.find(function(i) { return i.uid === uid; });
      if (item) item.status = novoStatus;
      atualizarResumo();
    } catch(e) {
      alert('Erro ao salvar status: ' + e.message);
    }
  };

  // ── MODAL CONFIG ───────────────────────────────────
  window.abrirModalConfig = function() {
    document.getElementById('cfg-email-exibido').textContent = auth.currentUser ? auth.currentUser.email : '';
    document.getElementById('cfg-nova-senha').value    = '';
    document.getElementById('cfg-confirma-senha').value = '';
    esconderMsg('msg-conta');
    esconderMsg('msg-admins');
    document.getElementById('modal-config').style.display = 'flex';
    mudarCfgTab('conta');
    carregarAdmins();
  };

  window.fecharModalConfig = function() {
    document.getElementById('modal-config').style.display = 'none';
  };

  window.mudarCfgTab = function(tab) {
    var eConta  = tab === 'conta';
    document.getElementById('cfg-painel-conta').style.display  = eConta ? 'block' : 'none';
    document.getElementById('cfg-painel-admins').style.display = eConta ? 'none'  : 'block';
    estilizarTabCfg('cfg-tab-conta',   eConta);
    estilizarTabCfg('cfg-tab-admins',  !eConta);
  };

  function estilizarTabCfg(id, ativo) {
    var el = document.getElementById(id);
    el.style.background   = ativo ? 'white' : '#f0f0f0';
    el.style.color        = ativo ? '#2d2d2d' : '#888';
    el.style.borderBottom = ativo ? '2px solid #2d3e20' : '2px solid transparent';
  }

  // ── MINHA CONTA ────────────────────────────────────
  window.salvarNovoEmail = async function() {
    var novoEmail = document.getElementById('cfg-novo-email').value.trim();
    var btn = document.getElementById('btn-salvar-email');
    if (!novoEmail) { mostrarMsg('msg-conta', 'Digite o novo e-mail.', 'erro'); return; }
    btn.disabled = true; btn.textContent = 'Salvando...';
    try {
      await updateEmail(auth.currentUser, novoEmail);
      document.getElementById('header-email').textContent = novoEmail;
      mostrarMsg('msg-conta', '✓ E-mail atualizado!', 'ok');
    } catch(e) {
      var txt = e.code === 'auth/requires-recent-login'
        ? 'Faça logout e login novamente antes de alterar o e-mail.'
        : 'Erro: ' + e.message;
      mostrarMsg('msg-conta', txt, 'erro');
    }
    btn.disabled = false; btn.textContent = 'Atualizar e-mail';
  };

  window.salvarNovaSenha = async function() {
    var nova     = document.getElementById('cfg-nova-senha').value;
    var confirma = document.getElementById('cfg-confirma-senha').value;
    var btn      = document.getElementById('btn-salvar-senha');

    if (!nova)             { mostrarMsg('msg-conta', 'Digite a nova senha.', 'erro'); return; }
    if (nova.length < 8)   { mostrarMsg('msg-conta', 'Mínimo 8 caracteres.', 'erro'); return; }
    if (nova !== confirma) { mostrarMsg('msg-conta', 'As senhas não coincidem.', 'erro'); return; }

    btn.disabled = true; btn.textContent = 'Salvando...';
    try {
      await updatePassword(auth.currentUser, nova);
      document.getElementById('cfg-nova-senha').value    = '';
      document.getElementById('cfg-confirma-senha').value = '';
      mostrarMsg('msg-conta', '✓ Senha alterada com sucesso!', 'ok');
    } catch(e) {
      var txt = e.code === 'auth/requires-recent-login'
        ? 'Faça logout e login novamente antes de alterar a senha.'
        : 'Erro: ' + e.message;
      mostrarMsg('msg-conta', txt, 'erro');
    }
    btn.disabled = false; btn.textContent = 'Salvar nova senha';
  };

  // ── ADMINISTRADORES ────────────────────────────────
  async function carregarAdmins() {
    var el = document.getElementById('lista-admins');
    el.innerHTML = '<div style="font-size:13px;color:#aaa;">Carregando...</div>';
    try {
      var snap = await getDocs(collection(db, 'admins'));
      if (snap.empty) { el.innerHTML = '<div style="font-size:13px;color:#aaa;">Nenhum admin cadastrado.</div>'; return; }
      el.innerHTML = snap.docs.map(function(d) {
        var data = d.data();
        var email = data.email || d.id;
        var isSelf = auth.currentUser && d.id === auth.currentUser.uid;
        return '<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f5f5f5;">' +
          '<div style="font-size:13px;color:#2d2d2d;">🛡️ ' + email + (isSelf ? ' <span style="font-size:11px;color:#aaa;">(você)</span>' : '') + '</div>' +
          (!isSelf ? '<button onclick="removerAdmin(\'' + d.id + '\',this)" style="background:none;border:none;color:#e57373;font-size:12px;cursor:pointer;font-weight:700;">Remover</button>' : '') +
        '</div>';
      }).join('');
    } catch(e) {
      el.innerHTML = '<div style="font-size:13px;color:#c0392b;">Erro ao carregar: ' + e.message + '</div>';
    }
  }


  window.removerAdmin = async function(uid, btn) {
    if (!confirm('Remover este admin?')) return;
    btn.textContent = '...';
    try {
      await deleteDoc(doc(db, 'admins', uid));
      carregarAdmins();
    } catch(e) {
      alert('Erro ao remover: ' + e.message);
      btn.textContent = 'Remover';
    }
  };

  // ── HELPERS MSG ────────────────────────────────────
  function mostrarMsg(id, texto, tipo) {
    var el = document.getElementById(id);
    el.textContent = texto;
    el.style.display = 'block';
    el.style.background = tipo === 'ok' ? '#eef3e8' : '#fdecea';
    el.style.color      = tipo === 'ok' ? '#3a4e2a' : '#c0392b';
  }

  function esconderMsg(id) {
    document.getElementById(id).style.display = 'none';
  }

  // ── SAIR ───────────────────────────────────────────
  window.sair = function() {
    signOut(auth).then(function() {
      window.location.reload();
    }).catch(function() {
      window.location.reload();
    });
  };

  // ── HELPERS ────────────────────────────────────────
  function formatarData(iso) {
    if (!iso) return '—';
    try {
      return new Date(iso).toLocaleDateString('pt-BR');
    } catch(e) { return iso; }
  }
</script>

</body>
