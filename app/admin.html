<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kinder — Painel Admin</title>
  <link rel="icon" type="image/png" href="../Kinder_Coracao.png">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script>emailjs.init('sNQgEYMxGZ6_abMxT');</script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f0f2ec; font-family: 'Nunito', sans-serif; min-height: 100vh; }

    header {
      background: #2d3e20;
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo { font-size: 16px; font-weight: 700; color: #c8d8a0; letter-spacing: 3px; }
    .admin-badge { font-size: 11px; font-weight: 700; background: #c8d8a0; color: #2d3e20; padding: 3px 10px; border-radius: 99px; letter-spacing: 1px; }
    .btn-sair { background: rgba(255,255,255,0.1); border: none; color: #c8d8a0; font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 700; padding: 6px 14px; border-radius: 8px; cursor: pointer; }
    .btn-sair:hover { background: rgba(255,255,255,0.2); }

    .loading { display: flex; align-items: center; justify-content: center; min-height: 60vh; font-size: 14px; color: #888; }

    .container { max-width: 1100px; margin: 0 auto; padding: 28px 20px 60px; display: none; }

    /* RESUMO */
    .resumo { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; margin-bottom: 32px; }
    @media (max-width: 600px) { .resumo { grid-template-columns: 1fr; } }

    .resumo-card {
      background: white;
      border-radius: 12px;
      padding: 20px 24px;
    }

    .resumo-topo { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
    .resumo-icone { font-size: 32px; }
    .resumo-num { font-size: 28px; font-weight: 700; color: #2d2d2d; line-height: 1; }
    .resumo-label { font-size: 12px; color: #888; margin-top: 3px; }

    .resumo-status { display: flex; flex-wrap: wrap; gap: 8px; }
    .resumo-status-item { font-size: 12px; color: #555; background: #f5f5f5; border-radius: 8px; padding: 4px 10px; cursor: pointer; transition: background 0.15s; }
    .resumo-status-item:hover { background: #e8edd8; color: #2d3e20; }
    .resumo-status-item span { font-weight: 700; color: #2d2d2d; }

    /* TABS */
    .tabs { display: flex; gap: 4px; margin-bottom: 20px; background: white; padding: 6px; border-radius: 12px; width: fit-content; }
    .tab { padding: 8px 20px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; color: #888; border: none; background: none; font-family: 'Nunito', sans-serif; transition: all 0.15s; }
    .tab.ativo { background: #3a4e2a; color: #c8d8a0; }

    /* FILTROS */
    .filtros { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    .filtros input, .filtros select { padding: 9px 14px; border: 1.5px solid #e0e0e0; border-radius: 8px; font-family: 'Nunito', sans-serif; font-size: 13px; outline: none; background: white; color: #2d2d2d; }
    .filtros input:focus, .filtros select:focus { border-color: #6b7c52; }
    .filtros input { min-width: 200px; flex: 1; }

    /* CARDS */
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }

    .card {
      background: white;
      border-radius: 14px;
      padding: 20px;
      border: 2px solid #f0f0f0;
      transition: border 0.2s;
    }

    .card:hover { border-color: #c8d8a0; }

    .card-topo { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
    .card-foto { width: 52px; height: 52px; border-radius: 50%; background: #e8e8e8; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
    .card-nome { font-size: 15px; font-weight: 700; color: #2d2d2d; margin-bottom: 2px; }
    .card-email { font-size: 12px; color: #aaa; }
    .card-info { font-size: 13px; color: #555; margin-bottom: 10px; line-height: 1.6; }

    .tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 14px; }
    .tag { font-size: 11px; padding: 3px 9px; border-radius: 99px; font-weight: 600; }
    .tag-cidade { background: #eef3e8; color: #4a5e3a; }
    .tag-exp { background: #e8f0ff; color: #3a5aa0; }
    .tag-modal { background: #fff3e8; color: #a05a3a; }
    .tag-cond { background: #f5e8ff; color: #6a3aa0; }

    /* STATUS SELECT */
    .status-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding-top: 12px; border-top: 1px solid #f0f0f0; }
    .status-label-txt { font-size: 12px; color: #888; font-weight: 600; }

    .status-select {
      font-family: 'Nunito', sans-serif;
      font-size: 12px;
      font-weight: 700;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      padding: 6px 10px;
      cursor: pointer;
      outline: none;
      color: #2d2d2d;
      background: white;
    }

    .status-select.pendente   { border-color: #f0d080; color: #7a5a10; background: #fff8e8; }
    .status-select.analise    { border-color: #a0b8f0; color: #1a3a80; background: #e8f0ff; }
    .status-select.aprovado   { border-color: #90c880; color: #2a5a1a; background: #eef8e8; }
    .status-select.suspenso   { border-color: #f0a0a0; color: #800000; background: #fee8e8; }
    .status-select.andamento  { border-color: #a0b8f0; color: #1a3a80; background: #e8f0ff; }
    .status-select.match      { border-color: #90c880; color: #2a5a1a; background: #eef8e8; }

    .btn-whats { background: #25d366; color: white; border: none; padding: 6px 12px; border-radius: 8px; font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; }

    .vazio { text-align: center; padding: 48px; color: #bbb; font-size: 14px; background: white; border-radius: 14px; }

    /* DATA */
    .card-data { font-size: 11px; color: #ccc; margin-top: 6px; }
  </style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:12px;">
    <span class="logo">🤍 KINDER</span>
    <span class="admin-badge">ADMIN</span>
  </div>
  <div style="display:flex;align-items:center;gap:10px;">
    <span style="font-size:12px;color:#8a9e6a;" id="header-email"></span>
    <a href="match.html" class="btn-sair">🤝 Match</a>
    <button class="btn-sair" onclick="abrirModalConfig()">⚙️ Config</button>
    <button class="btn-sair" onclick="sair()">Sair</button>
  </div>
</header>

<!-- TELA DE LOGIN ADMIN -->
<div id="tela-login" style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;">
  <div style="background:white;border-radius:16px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 4px 24px rgba(0,0,0,0.08);">
    <div style="font-size:13px;font-weight:700;color:#6b7c52;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;">Acesso restrito</div>
    <div style="font-size:20px;font-weight:700;color:#2d2d2d;margin-bottom:24px;">Painel Admin</div>
    <div id="msg-login" style="font-size:13px;padding:10px 14px;border-radius:8px;margin-bottom:16px;display:none;background:#fdecea;color:#c0392b;"></div>
    <div style="margin-bottom:14px;">
      <label style="display:block;font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;">E-mail</label>
      <input type="email" id="input-email" placeholder="seu@email.com"
        style="width:100%;padding:12px 14px;border:1.5px solid #e0e0e0;border-radius:10px;font-family:Nunito,sans-serif;font-size:15px;outline:none;"
        onkeydown="if(event.key==='Enter')entrarAdmin()">
    </div>
    <div style="margin-bottom:20px;">
      <label style="display:block;font-size:11px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;">Senha</label>
      <input type="password" id="input-senha" placeholder="••••••••"
        style="width:100%;padding:12px 14px;border:1.5px solid #e0e0e0;border-radius:10px;font-family:Nunito,sans-serif;font-size:15px;outline:none;"
        onkeydown="if(event.key==='Enter')entrarAdmin()">
    </div>
    <button onclick="entrarAdmin()" id="btn-entrar"
      style="width:100%;padding:13px;background:#2d3e20;color:#c8d8a0;border:none;border-radius:10px;font-family:Nunito,sans-serif;font-size:14px;font-weight:700;cursor:pointer;">
      Entrar →
    </button>
  </div>
</div>

<div class="loading" id="loading" style="display:none;">Carregando painel...</div>

<div class="container" id="container">

  <!-- RESUMO -->
  <div class="resumo">
    <div class="resumo-card">
      <div class="resumo-topo" onclick="filtrarPorStatus('cuidadores','')" style="cursor:pointer;">
        <div class="resumo-icone">🧑‍⚕️</div>
        <div>
          <div class="resumo-num" id="num-cuidadores">—</div>
          <div class="resumo-label">Cuidadores</div>
        </div>
      </div>
      <div class="resumo-status" id="status-cuidadores"></div>
    </div>
    <div class="resumo-card">
      <div class="resumo-topo" onclick="filtrarPorStatus('familias','')" style="cursor:pointer;">
        <div class="resumo-icone">🏠</div>
        <div>
          <div class="resumo-num" id="num-familias">—</div>
          <div class="resumo-label">Famílias</div>
        </div>
      </div>
      <div class="resumo-status" id="status-familias"></div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab ativo" onclick="mudarTab('cuidadores')">🧑‍⚕️ Cuidadores</button>
    <button class="tab" onclick="mudarTab('familias')">🏠 Famílias</button>
    <button class="tab" onclick="mudarTab('interesses')">❤️ Interesses <span id="badge-interesses" style="display:none;background:#e57373;color:white;font-size:10px;padding:1px 6px;border-radius:99px;margin-left:4px;"></span></button>
  </div>

  <!-- PAINEL INTERESSES -->
  <div id="painel-interesses" style="display:none;">
    <div id="lista-interesses"><div class="vazio">Nenhum interesse pendente.</div></div>
  </div>

  <!-- FILTROS -->
  <div class="filtros" id="painel-filtros">
    <input type="text" id="filtro-busca" placeholder="Buscar por nome ou email..." oninput="renderAtual()">
    <select id="filtro-status" onchange="renderAtual()">
      <option value="">Todos os status</option>
      <option value="pendente">Pendente</option>
      <option value="analise">Em análise</option>
      <option value="aprovado">Aprovado</option>
      <option value="suspenso">Suspenso</option>
      <option value="andamento">Em andamento</option>
      <option value="match">Match encontrado</option>
      <option value="excluido">🗑 Excluídos</option>
    </select>
  </div>

  <!-- LISTA -->
  <div class="cards-grid" id="cards-grid"></div>

</div>

<!-- MODAL CONFIGURAÇÕES -->
<div id="modal-config" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;align-items:center;justify-content:center;padding:16px;">
  <div style="background:white;border-radius:16px;width:100%;max-width:440px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.15);">

    <!-- Header modal -->
    <div style="background:#2d3e20;padding:20px 24px;display:flex;align-items:center;justify-content:space-between;">
      <div style="font-size:16px;font-weight:700;color:#c8d8a0;">⚙️ Configurações</div>
      <button onclick="fecharModalConfig()" style="background:none;border:none;color:#8a9e6a;font-size:20px;cursor:pointer;line-height:1;">×</button>
    </div>

    <!-- Tabs do modal -->
    <div style="display:flex;border-bottom:2px solid #f0f0f0;">
      <button id="cfg-tab-conta" onclick="mudarCfgTab('conta')"
        style="flex:1;padding:12px;font-family:Nunito,sans-serif;font-size:13px;font-weight:700;border:none;cursor:pointer;background:white;color:#2d2d2d;border-bottom:2px solid #2d3e20;margin-bottom:-2px;">
        👤 Minha conta
      </button>
      <button id="cfg-tab-admins" onclick="mudarCfgTab('admins')"
        style="flex:1;padding:12px;font-family:Nunito,sans-serif;font-size:13px;font-weight:700;border:none;cursor:pointer;background:white;color:#aaa;border-bottom:2px solid transparent;margin-bottom:-2px;">
        🛡️ Administradores
      </button>
    </div>

    <!-- Aba: Minha conta -->
    <div id="cfg-painel-conta" style="padding:24px;">
      <div id="msg-conta" style="font-size:13px;padding:10px 14px;border-radius:8px;margin-bottom:16px;display:none;"></div>

      <div style="margin-bottom:12px;">
        <div style="font-size:12px;color:#aaa;margin-bottom:4px;">Logado como</div>
        <div style="font-size:14px;font-weight:700;color:#2d2d2d;" id="cfg-email-exibido"></div>
      </div>

      <div style="border-top:1px solid #f0f0f0;padding-top:20px;">
        <div style="font-size:12px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;">Alterar senha</div>
        <div style="margin-bottom:12px;">
          <input type="password" id="cfg-nova-senha" placeholder="Nova senha (mín. 8 caracteres)"
            style="width:100%;padding:11px 14px;border:1.5px solid #e0e0e0;border-radius:8px;font-family:Nunito,sans-serif;font-size:14px;outline:none;">
        </div>
        <div style="margin-bottom:16px;">
          <input type="password" id="cfg-confirma-senha" placeholder="Confirmar nova senha"
            style="width:100%;padding:11px 14px;border:1.5px solid #e0e0e0;border-radius:8px;font-family:Nunito,sans-serif;font-size:14px;outline:none;">
        </div>
        <button onclick="salvarNovaSenha()" id="btn-salvar-senha"
          style="width:100%;padding:11px;background:#2d3e20;color:#c8d8a0;border:none;border-radius:8px;font-family:Nunito,sans-serif;font-size:14px;font-weight:700;cursor:pointer;">
          Salvar nova senha
        </button>
      </div>
    </div>

    <!-- Aba: Administradores -->
    <div id="cfg-painel-admins" style="padding:24px;display:none;">
      <div id="msg-admins" style="font-size:13px;padding:10px 14px;border-radius:8px;margin-bottom:16px;display:none;"></div>

      <div style="font-size:12px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;">Admins cadastrados</div>
      <div id="lista-admins" style="margin-bottom:20px;min-height:40px;"></div>

    </div>

  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, updatePassword, updateEmail, createUserWithEmailAndPassword }
    from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
  import { getFirestore, collection, getDocs, doc, updateDoc, getDoc, setDoc, deleteDoc, query, where, orderBy }
    from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAMe9GRhZyYOiDCVQBxMnu8MHjuaY1hY5Y",
    authDomain: "kinder-4dd7b.firebaseapp.com",
    projectId: "kinder-4dd7b",
    storageBucket: "kinder-4dd7b.firebasestorage.app",
    messagingSenderId: "874034411154",
    appId: "1:874034411154:web:8fb0122f8b9750197dd84b",
    measurementId: "G-KKN5D5NEK0"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  var cuidadores = [];
  var familias   = [];
  var tabAtual   = 'cuidadores';

  // ── AUTH ────────────────────────────────────────────
  onAuthStateChanged(auth, async (user) => {
    if (!user) return; // aguarda login manual

    const adminSnap = await getDoc(doc(db, 'admins', user.uid));
    if (!adminSnap.exists()) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('tela-login').style.display = 'flex';
      mostrarErroLogin('Acesso negado para este usuário.');
      await signOut(auth);
      return;
    }

    document.getElementById('tela-login').style.display  = 'none';
    document.getElementById('loading').style.display     = 'flex';
    document.getElementById('header-email').textContent  = user.email;
    await carregarDados();
    carregarBadgeInteresses();
  });

  window.entrarAdmin = async function() {
    const email = document.getElementById('input-email').value.trim();
    const senha = document.getElementById('input-senha').value;
    const btn   = document.getElementById('btn-entrar');

    if (!email || !senha) { mostrarErroLogin('Preencha e-mail e senha.'); return; }

    btn.disabled = true;
    btn.textContent = 'Entrando...';

    try {
      await signInWithEmailAndPassword(auth, email, senha);
    } catch(e) {
      btn.disabled = false;
      btn.textContent = 'Entrar →';
      mostrarErroLogin('E-mail ou senha incorretos.');
    }
  };

  function mostrarErroLogin(msg) {
    var el = document.getElementById('msg-login');
    el.textContent = msg;
    el.style.display = 'block';
  }

  // ── CARREGAR DADOS ─────────────────────────────────
  async function carregarDados() {
    const [snapC, snapF] = await Promise.all([
      getDocs(collection(db, 'cuidadores')),
      getDocs(collection(db, 'familias'))
    ]);

    cuidadores = snapC.docs.map(d => ({ uid: d.id, ...d.data() }));
    familias   = snapF.docs.map(d => ({ uid: d.id, ...d.data() }));

    // Resumo
    document.getElementById('num-cuidadores').textContent = cuidadores.length;
    document.getElementById('num-familias').textContent   = familias.length;

    atualizarResumo();

    document.getElementById('loading').style.display  = 'none';
    document.getElementById('container').style.display = 'block';

    renderAtual();
  }

  // ── RENDER ─────────────────────────────────────────
  window.renderAtual = function() {
    if (tabAtual === 'cuidadores') renderCuidadores();
    else renderFamilias();
  };

  window.mudarTab = function(tab) {
    tabAtual = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('ativo'));
    event.target.classList.add('ativo');
    var isInteresses = tab === 'interesses';
    document.getElementById('painel-interesses').style.display = isInteresses ? 'block' : 'none';
    document.getElementById('painel-filtros').style.display    = isInteresses ? 'none' : 'flex';
    document.getElementById('cards-grid').style.display        = isInteresses ? 'none' : 'grid';
    if (isInteresses) {
      renderInteresses();
    } else {
      document.getElementById('filtro-status').value = '';
      document.getElementById('filtro-busca').value  = '';
      renderAtual();
    }
  };

  function filtrar(lista) {
    var busca  = document.getElementById('filtro-busca').value.toLowerCase();
    var status = document.getElementById('filtro-status').value;
    return lista.filter(function(item) {
      var nome  = (item.nome || '').toLowerCase();
      var email = (item.email || '').toLowerCase();
      if (busca && nome.indexOf(busca) === -1 && email.indexOf(busca) === -1) return false;
      if (status) {
        if (item.status !== status) return false;
      } else {
        if (item.status === 'excluido') return false;
      }
      return true;
    });
  }

  function renderCuidadores() {
    var lista = filtrar(cuidadores);
    var el    = document.getElementById('cards-grid');
    if (!lista.length) { el.innerHTML = '<div class="vazio">Nenhum cuidador encontrado.</div>'; return; }

    el.innerHTML = lista.map(function(c) {
      var p    = c.perfil || {};
      var exps = Array.isArray(p.experiencia) ? p.experiencia.slice(0,3) : [];
      var mods = Array.isArray(p.modalidade)  ? p.modalidade.slice(0,2)  : [];
      var tags = '';
      if (p.cidade)  tags += '<span class="tag tag-cidade">📍 ' + p.cidade + '</span>';
      exps.forEach(function(e) { tags += '<span class="tag tag-exp">' + e + '</span>'; });
      mods.forEach(function(m) { tags += '<span class="tag tag-modal">' + m + '</span>'; });

      var statusCls = c.status || 'pendente';
      var whatsLink = p.whatsapp ? 'https://wa.me/55' + p.whatsapp.replace(/\D/g,'') : '';

      return '<div class="card">' +
        '<div class="card-topo">' +
          '<div class="card-foto">' + (p.fotoUrl ? '<img src="' + p.fotoUrl + '" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">' : '🧑‍⚕️') + '</div>' +
          '<div>' +
            '<div class="card-nome">' + (c.nome || '—') + '</div>' +
            '<div class="card-email">' + (c.email || '') + '</div>' +
            '<div class="card-data">Cadastro: ' + formatarData(c.criadoEm) + '</div>' +
          '</div>' +
        '</div>' +
        (tags ? '<div class="tags">' + tags + '</div>' : '') +
        ((p.docUrl || p.antecedentesUrl) ? '<div style="display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 4px;">' +
          (p.docUrl ? '<a href="' + p.docUrl + '" target="_blank" style="font-size:11px;font-weight:700;padding:4px 10px;background:#1a3a6b;color:white;border-radius:8px;text-decoration:none;">🪪 Documento</a>' : '') +
          (p.antecedentesUrl ? '<a href="' + p.antecedentesUrl + '" target="_blank" style="font-size:11px;font-weight:700;padding:4px 10px;background:#e67e22;color:white;border-radius:8px;text-decoration:none;">📋 Antecedentes</a>' : '') +
        '</div>' : '') +
        (c.status !== 'excluido' ? '<div style="margin:8px 0 4px;">' +
          '<button id="btn-email-' + c.uid + '" onclick="enviarEmailDocs(\'' + c.uid + '\',\'' + (c.nome||'').replace(/'/g,"\\'") + '\',\'' + (c.email||'') + '\')" ' +
          (c.emailDocsSolicitado ? 'disabled style="font-size:11px;font-weight:700;padding:4px 12px;background:#f0f0f0;color:#aaa;border:none;border-radius:8px;cursor:not-allowed;"' : 'style="font-size:11px;font-weight:700;padding:4px 12px;background:#eef3e8;color:#3a4e2a;border:none;border-radius:8px;cursor:pointer;"') + '>' +
          (c.emailDocsSolicitado ? '✓ Email enviado' : '📧 Solicitar docs') +
          '</button>' +
        '</div>' : '') +
        '<div class="status-row">' +
          '<span class="status-label-txt">Status</span>' +
          '<div style="display:flex;gap:8px;align-items:center;">' +
            (c.status === 'excluido'
              ? '<button onclick="restaurarRegistro(\'cuidadores\',\'' + c.uid + '\')" style="background:#eef3e8;color:#3a4e2a;border:none;padding:6px 12px;border-radius:8px;font-family:Nunito,sans-serif;font-size:12px;font-weight:700;cursor:pointer;">↩ Restaurar</button>'
              : (whatsLink ? '<a href="' + whatsLink + '" target="_blank" class="btn-whats">📱 WhatsApp</a>' : '') +
                '<select class="status-select ' + statusCls + '" onchange="mudarStatus(\'cuidadores\',\'' + c.uid + '\',this)">' +
                  '<option value="pendente"'  + (c.status==='pendente' ?' selected':'') + '>⏳ Pendente</option>' +
                  '<option value="analise"'   + (c.status==='analise'  ?' selected':'') + '>🔍 Em análise</option>' +
                  '<option value="aprovado"'  + (c.status==='aprovado' ?' selected':'') + '>✅ Aprovado</option>' +
                  '<option value="suspenso"'  + (c.status==='suspenso' ?' selected':'') + '>🚫 Suspenso</option>' +
                '</select>' +
                '<button onclick="excluirRegistro(\'cuidadores\',\'' + c.uid + '\')" title="Excluir" style="background:none;border:none;cursor:pointer;font-size:16px;color:#ddd;padding:4px;" onmouseover="this.style.color=\'#e57373\'" onmouseout="this.style.color=\'#ddd\'">🗑</button>'
            ) +
          '</div>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  function renderFamilias() {
    var lista = filtrar(familias);
    var el    = document.getElementById('cards-grid');
    if (!lista.length) { el.innerHTML = '<div class="vazio">Nenhuma família encontrada.</div>'; return; }

    el.innerHTML = lista.map(function(f) {
      var p    = f.perfil || {};
      var conds = Array.isArray(p.condicao) ? p.condicao.slice(0,2) : [];
      var tags = '';
      if (p.cidade)    tags += '<span class="tag tag-cidade">📍 ' + p.cidade + '</span>';
      if (p.dependencia) tags += '<span class="tag tag-modal">' + p.dependencia + '</span>';
      conds.forEach(function(c) { tags += '<span class="tag tag-cond">' + c + '</span>'; });

      var statusCls = f.status || 'pendente';
      var whatsLink = p.whatsapp ? 'https://wa.me/55' + p.whatsapp.replace(/\D/g,'') : '';
      var idosoInfo = p.nome_idoso ? p.nome_idoso + (p.idade ? ', ' + p.idade + ' anos' : '') : '';

      return '<div class="card">' +
        '<div class="card-topo">' +
          '<div class="card-foto">🏠</div>' +
          '<div>' +
            '<div class="card-nome">' + (f.nome || '—') + '</div>' +
            '<div class="card-email">' + (f.email || '') + '</div>' +
            '<div class="card-data">Cadastro: ' + formatarData(f.criadoEm) + '</div>' +
          '</div>' +
        '</div>' +
        (idosoInfo ? '<div class="card-info">👴 ' + idosoInfo + '</div>' : '') +
        (tags ? '<div class="tags">' + tags + '</div>' : '') +
        '<div class="status-row">' +
          '<span class="status-label-txt">Status</span>' +
          '<div style="display:flex;gap:8px;align-items:center;">' +
            (f.status === 'excluido'
              ? '<button onclick="restaurarRegistro(\'familias\',\'' + f.uid + '\')" style="background:#eef3e8;color:#3a4e2a;border:none;padding:6px 12px;border-radius:8px;font-family:Nunito,sans-serif;font-size:12px;font-weight:700;cursor:pointer;">↩ Restaurar</button>'
              : (whatsLink ? '<a href="' + whatsLink + '" target="_blank" class="btn-whats">📱 WhatsApp</a>' : '') +
                '<select class="status-select ' + statusCls + '" onchange="mudarStatus(\'familias\',\'' + f.uid + '\',this)">' +
                  '<option value="pendente"'   + (f.status==='pendente'  ?' selected':'') + '>⏳ Aguardando</option>' +
                  '<option value="andamento"'  + (f.status==='andamento' ?' selected':'') + '>🔍 Em andamento</option>' +
                  '<option value="match"'      + (f.status==='match'     ?' selected':'') + '>✅ Match encontrado</option>' +
                '</select>' +
                '<button onclick="excluirRegistro(\'familias\',\'' + f.uid + '\')" title="Excluir" style="background:none;border:none;cursor:pointer;font-size:16px;color:#ddd;padding:4px;" onmouseover="this.style.color=\'#e57373\'" onmouseout="this.style.color=\'#ddd\'">🗑</button>'
            ) +
          '</div>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  // ── RESUMO ─────────────────────────────────────────
  function atualizarResumo() {
    document.getElementById('num-cuidadores').textContent = cuidadores.length;
    document.getElementById('num-familias').textContent   = familias.length;

    var statusC = [
      { key: 'pendente', label: '⏳ Pendente' },
      { key: 'analise',  label: '🔍 Em análise' },
      { key: 'aprovado', label: '✅ Aprovado' },
      { key: 'suspenso', label: '🚫 Suspenso' }
    ];
    var statusF = [
      { key: 'pendente',  label: '⏳ Aguardando' },
      { key: 'andamento', label: '🔍 Em andamento' },
      { key: 'match',     label: '✅ Match' }
    ];

    document.getElementById('status-cuidadores').innerHTML = statusC.map(function(s) {
      var n = cuidadores.filter(function(c) { return (c.status || 'pendente') === s.key; }).length;
      return '<div class="resumo-status-item" onclick="filtrarPorStatus(\'cuidadores\',\'' + s.key + '\')">' + s.label + ' <span>' + n + '</span></div>';
    }).join('');

    document.getElementById('status-familias').innerHTML = statusF.map(function(s) {
      var n = familias.filter(function(f) { return (f.status || 'pendente') === s.key; }).length;
      return '<div class="resumo-status-item" onclick="filtrarPorStatus(\'familias\',\'' + s.key + '\')">' + s.label + ' <span>' + n + '</span></div>';
    }).join('');
  }

  // ── INTERESSES ─────────────────────────────────────
  async function carregarBadgeInteresses() {
    try {
      var snap = await getDocs(query(collection(db, 'interesses'), where('status', '==', 'pendente')));
      var badge = document.getElementById('badge-interesses');
      if (snap.size > 0) {
        badge.textContent = snap.size;
        badge.style.display = 'inline';
      } else {
        badge.style.display = 'none';
      }
    } catch(e) {}
  }

  async function renderInteresses() {
    var el = document.getElementById('lista-interesses');
    el.innerHTML = '<div style="font-size:13px;color:#aaa;padding:16px;">Carregando...</div>';
    try {
      var snap = await getDocs(query(collection(db, 'interesses'), orderBy('data', 'desc')));
      if (snap.empty) { el.innerHTML = '<div class="vazio">Nenhum interesse registrado.</div>'; return; }

      var statusLabel = { pendente: '⏳ Pendente', aprovado: '✅ Aprovado', recusado: '❌ Recusado' };
      el.innerHTML = snap.docs.map(function(d) {
        var m = d.data(), id = d.id;
        var data = m.data ? new Date(m.data).toLocaleDateString('pt-BR') : '—';
        var label = statusLabel[m.status] || m.status;
        var btns = m.status === 'pendente'
          ? '<button onclick="aprovarInteresse(\'' + id + '\')" style="background:#3a4e2a;color:#c8d8a0;border:none;padding:7px 14px;border-radius:8px;font-family:Nunito,sans-serif;font-size:12px;font-weight:700;cursor:pointer;margin-right:6px;">✅ Aprovar</button>' +
            '<button onclick="recusarInteresse(\'' + id + '\')" style="background:#f5e8e8;color:#c0392b;border:none;padding:7px 14px;border-radius:8px;font-family:Nunito,sans-serif;font-size:12px;font-weight:700;cursor:pointer;">❌ Recusar</button>'
          : '';
        return '<div style="background:white;border-radius:12px;padding:16px 20px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:16px;">' +
          '<div>' +
            '<div style="font-size:14px;font-weight:700;color:#2d2d2d;margin-bottom:2px;">❤️ ' + (m.familiaNome || '—') + ' → 🧑‍⚕️ ' + (m.cuidadorNome || '—') + '</div>' +
            '<div style="font-size:12px;color:#aaa;">' + data + ' · ' + (m.score || 0) + '% compatibilidade · ' + label + '</div>' +
            '<div style="font-size:12px;color:#888;">' + (m.familiaEmail || '') + '</div>' +
          '</div>' +
          '<div style="white-space:nowrap;">' + btns + '</div>' +
        '</div>';
      }).join('');
    } catch(e) {
      el.innerHTML = '<div style="font-size:13px;color:#c0392b;">Erro ao carregar: ' + e.message + '</div>';
    }
  }

  window.enviarEmailDocs = async function(uid, nome, email) {
    var btn = document.getElementById('btn-email-' + uid);
    btn.disabled = true;
    btn.textContent = 'Enviando...';
    try {
      await emailjs.send('service_l99a8hr', 'template_4s63nga', {
        para_email: email,
        nome: nome.split(' ')[0],
        email: email
      });
      await updateDoc(doc(db, 'cuidadores', uid), { emailDocsSolicitado: true });
      btn.textContent = '✓ Email enviado';
      btn.style.background = '#f0f0f0';
      btn.style.color = '#aaa';
      btn.style.cursor = 'not-allowed';
    } catch(e) {
      btn.disabled = false;
      btn.textContent = '📧 Solicitar docs';
      alert('Erro ao enviar email: ' + e.text || e.message);
    }
  };

  window.aprovarInteresse = async function(id) {
    try {
      await updateDoc(doc(db, 'interesses', id), { status: 'aprovado' });
      carregarBadgeInteresses();
      renderInteresses();
    } catch(e) { alert('Erro: ' + e.message); }
  };

  window.recusarInteresse = async function(id) {
    try {
      await updateDoc(doc(db, 'interesses', id), { status: 'recusado' });
      carregarBadgeInteresses();
      renderInteresses();
    } catch(e) { alert('Erro: ' + e.message); }
  };

  window.filtrarPorStatus = function(tab, status) {
    tabAtual = tab;
    document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('ativo'); });
    document.querySelector('.tab[onclick*="' + tab + '"]').classList.add('ativo');
    document.getElementById('filtro-status').value = status;
    document.getElementById('filtro-busca').value  = '';
    renderAtual();
    document.getElementById('container').scrollIntoView({ behavior: 'smooth' });
  };

  // ── RESTAURAR ──────────────────────────────────────
  window.restaurarRegistro = async function(colecao, uid) {
    try {
      await updateDoc(doc(db, colecao, uid), { status: 'pendente' });
      var lista = colecao === 'cuidadores' ? cuidadores : familias;
      var item  = lista.find(function(i) { return i.uid === uid; });
      if (item) item.status = 'pendente';
      atualizarResumo();
      renderAtual();
    } catch(e) {
      alert('Erro ao restaurar: ' + e.message);
    }
  };

  // ── EXCLUIR (soft delete) ──────────────────────────
  window.excluirRegistro = async function(colecao, uid) {
    if (!confirm('Excluir este registro? Ele ficará oculto mas pode ser recuperado pelo filtro "Excluídos".')) return;
    try {
      await updateDoc(doc(db, colecao, uid), { status: 'excluido' });
      var lista = colecao === 'cuidadores' ? cuidadores : familias;
      var item  = lista.find(function(i) { return i.uid === uid; });
      if (item) item.status = 'excluido';
      atualizarResumo();
      renderAtual();
    } catch(e) {
      alert('Erro ao excluir: ' + e.message);
    }
  };

  // ── MUDAR STATUS ───────────────────────────────────
  window.mudarStatus = async function(colecao, uid, selectEl) {
    var novoStatus = selectEl.value;
    selectEl.className = 'status-select ' + novoStatus;
    try {
      await updateDoc(doc(db, colecao, uid), { status: novoStatus });
      // Atualiza local
      var lista = colecao === 'cuidadores' ? cuidadores : familias;
      var item  = lista.find(function(i) { return i.uid === uid; });
      if (item) item.status = novoStatus;
      atualizarResumo();
    } catch(e) {
      alert('Erro ao salvar status: ' + e.message);
    }
  };

  // ── MODAL CONFIG ───────────────────────────────────
  window.abrirModalConfig = function() {
    document.getElementById('cfg-email-exibido').textContent = auth.currentUser ? auth.currentUser.email : '';
    document.getElementById('cfg-nova-senha').value    = '';
    document.getElementById('cfg-confirma-senha').value = '';
    esconderMsg('msg-conta');
    esconderMsg('msg-admins');
    document.getElementById('modal-config').style.display = 'flex';
    mudarCfgTab('conta');
    carregarAdmins();
  };

  window.fecharModalConfig = function() {
    document.getElementById('modal-config').style.display = 'none';
  };

  window.mudarCfgTab = function(tab) {
    var eConta  = tab === 'conta';
    document.getElementById('cfg-painel-conta').style.display  = eConta ? 'block' : 'none';
    document.getElementById('cfg-painel-admins').style.display = eConta ? 'none'  : 'block';
    estilizarTabCfg('cfg-tab-conta',   eConta);
    estilizarTabCfg('cfg-tab-admins',  !eConta);
  };

  function estilizarTabCfg(id, ativo) {
    var el = document.getElementById(id);
    el.style.background   = ativo ? 'white' : '#f0f0f0';
    el.style.color        = ativo ? '#2d2d2d' : '#888';
    el.style.borderBottom = ativo ? '2px solid #2d3e20' : '2px solid transparent';
  }

  // ── MINHA CONTA ────────────────────────────────────
  window.salvarNovoEmail = async function() {
    var novoEmail = document.getElementById('cfg-novo-email').value.trim();
    var btn = document.getElementById('btn-salvar-email');
    if (!novoEmail) { mostrarMsg('msg-conta', 'Digite o novo e-mail.', 'erro'); return; }
    btn.disabled = true; btn.textContent = 'Salvando...';
    try {
      await updateEmail(auth.currentUser, novoEmail);
      document.getElementById('header-email').textContent = novoEmail;
      mostrarMsg('msg-conta', '✓ E-mail atualizado!', 'ok');
    } catch(e) {
      var txt = e.code === 'auth/requires-recent-login'
        ? 'Faça logout e login novamente antes de alterar o e-mail.'
        : 'Erro: ' + e.message;
      mostrarMsg('msg-conta', txt, 'erro');
    }
    btn.disabled = false; btn.textContent = 'Atualizar e-mail';
  };

  window.salvarNovaSenha = async function() {
    var nova     = document.getElementById('cfg-nova-senha').value;
    var confirma = document.getElementById('cfg-confirma-senha').value;
    var btn      = document.getElementById('btn-salvar-senha');

    if (!nova)             { mostrarMsg('msg-conta', 'Digite a nova senha.', 'erro'); return; }
    if (nova.length < 8)   { mostrarMsg('msg-conta', 'Mínimo 8 caracteres.', 'erro'); return; }
    if (nova !== confirma) { mostrarMsg('msg-conta', 'As senhas não coincidem.', 'erro'); return; }

    btn.disabled = true; btn.textContent = 'Salvando...';
    try {
      await updatePassword(auth.currentUser, nova);
      document.getElementById('cfg-nova-senha').value    = '';
      document.getElementById('cfg-confirma-senha').value = '';
      mostrarMsg('msg-conta', '✓ Senha alterada com sucesso!', 'ok');
    } catch(e) {
      var txt = e.code === 'auth/requires-recent-login'
        ? 'Faça logout e login novamente antes de alterar a senha.'
        : 'Erro: ' + e.message;
      mostrarMsg('msg-conta', txt, 'erro');
    }
    btn.disabled = false; btn.textContent = 'Salvar nova senha';
  };

  // ── ADMINISTRADORES ────────────────────────────────
  async function carregarAdmins() {
    var el = document.getElementById('lista-admins');
    el.innerHTML = '<div style="font-size:13px;color:#aaa;">Carregando...</div>';
    try {
      var snap = await getDocs(collection(db, 'admins'));
      if (snap.empty) { el.innerHTML = '<div style="font-size:13px;color:#aaa;">Nenhum admin cadastrado.</div>'; return; }
      el.innerHTML = snap.docs.map(function(d) {
        var data = d.data();
        var email = data.email || d.id;
        var isSelf = auth.currentUser && d.id === auth.currentUser.uid;
        return '<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f5f5f5;">' +
          '<div style="font-size:13px;color:#2d2d2d;">🛡️ ' + email + (isSelf ? ' <span style="font-size:11px;color:#aaa;">(você)</span>' : '') + '</div>' +
          (!isSelf ? '<button onclick="removerAdmin(\'' + d.id + '\',this)" style="background:none;border:none;color:#e57373;font-size:12px;cursor:pointer;font-weight:700;">Remover</button>' : '') +
        '</div>';
      }).join('');
    } catch(e) {
      el.innerHTML = '<div style="font-size:13px;color:#c0392b;">Erro ao carregar: ' + e.message + '</div>';
    }
  }


  window.removerAdmin = async function(uid, btn) {
    if (!confirm('Remover este admin?')) return;
    btn.textContent = '...';
    try {
      await deleteDoc(doc(db, 'admins', uid));
      carregarAdmins();
    } catch(e) {
      alert('Erro ao remover: ' + e.message);
      btn.textContent = 'Remover';
    }
  };

  // ── HELPERS MSG ────────────────────────────────────
  function mostrarMsg(id, texto, tipo) {
    var el = document.getElementById(id);
    el.textContent = texto;
    el.style.display = 'block';
    el.style.background = tipo === 'ok' ? '#eef3e8' : '#fdecea';
    el.style.color      = tipo === 'ok' ? '#3a4e2a' : '#c0392b';
  }

  function esconderMsg(id) {
    document.getElementById(id).style.display = 'none';
  }

  // ── SAIR ───────────────────────────────────────────
  window.sair = function() {
    signOut(auth).then(function() {
      window.location.reload();
    }).catch(function() {
      window.location.reload();
    });
  };

  // ── HELPERS ────────────────────────────────────────
  function formatarData(iso) {
    if (!iso) return '—';
    try {
      return new Date(iso).toLocaleDateString('pt-BR');
    } catch(e) { return iso; }
  }
</script>

</body>
</html>
